<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>لوحة تحكم البائع - Ali Holland</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <h2>Ali <span class="brand-primary">Holland</span></h2>
        <nav>
          <a href="#" class="active"
            ><i class="fas fa-plus-circle"></i> إضافة منتج</a
          >
          <a href="#"><i class="fas fa-box"></i> منتجاتي</a>
          <a href="#"><i class="fas fa-wallet"></i> الأرباح</a>
          <a href="#" id="logoutSellerLink">
            <i class="fas fa-sign-out-alt"></i> خروج
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <header>
          <h1 id="welcome-msg">مرحباً بك أيها البائع</h1>
          <div class="stats-cards">
            <div class="card">
              <h3>إجمالي المبيعات</h3>
              <p id="totalSales">0.00 €</p>
            </div>
            <div class="card commission-card">
              <h3>عمولة الموقع (4%)</h3>
              <p id="totalCommission">0.00 €</p>
            </div>
          </div>
        </header>

        <section class="add-product-section">
          <h2>إضافة منتج جديد للبيع</h2>
          <form id="productForm">
            <div class="input-group">
              <label>اسم المنتج</label>
              <input
                type="text"
                id="pName"
                placeholder="مثلاً: هاتف آيفون 15"
                required
              />
            </div>

            <div class="input-group">
              <label><i class="fas fa-align-right"></i> وصف المنتج</label>
              <textarea
                id="productDescription"
                placeholder="اكتب تفاصيل المنتج ومواصفاته هنا..."
                rows="4"
                required
              ></textarea>
            </div>

            <div class="input-group">
              <label><i class="fas fa-list"></i> اختر قسم المنتج</label>
              <select id="productCategory" class="category-select" required>
                <option value="" disabled selected>
                  اختر القسم المناسب...
                </option>
                <option value="electronics">إلكترونيات</option>
                <option value="clothes">ملابس</option>
                <option value="shoes">أحذية</option>
                <option value="accessories">إكسسوارات</option>
                <option value="watches">ساعات</option>
                <option value="perfumes">عطورات</option>
                <option value="herbs">أعشاب</option>
                <option value="supermarket">سوبر ماركت</option>
              </select>
            </div>

            <div class="input-group">
              <label>السعر المطلوب (€)</label>
              <input
                type="number"
                step="0.01"
                id="pPrice"
                placeholder="0.00"
                required
              />
            </div>

            <div id="liveCommissionBox" class="commission-info">
              سيتم خصم <strong>4%</strong> عمولة للموقع:
              <span id="calcValue">0.00</span> €
            </div>

            <div class="input-group">
              <label><i class="fas fa-image"></i> صورة المنتج</label>
              <div class="upload-box" id="uploadBox">
                <i
                  class="fas fa-cloud-upload-alt upload-icon"
                  id="uploadIcon"
                ></i>
                <p id="uploadText">اضغط هنا لرفع صورة</p>
                <img
                  id="imagePreview"
                  src="#"
                  alt="معاينة"
                  class="image-preview"
                />
                <input
                  type="file"
                  id="productImage"
                  accept="image/*"
                  hidden
                  required
                />
              </div>
            </div>

            <button type="submit" id="submitBtn" class="add-btn">
              نشر المنتج الآن
            </button>
          </form>
        </section>
      </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>

    <script src="../js/seller.js"></script>
  </body>
</html>
