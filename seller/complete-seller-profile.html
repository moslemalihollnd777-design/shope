<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إكمال بيانات المتجر - Ali Holland</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="container">
      <div class="logo">Ali <span>Holland</span></div>

      <h2>إثبات هويّة البائع</h2>
      <p class="subtitle">
        يرجى تزويدنا بالبيانات التالية لتفعيل متجرك وبدء البيع
      </p>

      <form id="profileForm">
        <div class="form-group">
          <label for="seller-phone">رقم الهاتف (مع رمز الدولة)</label>
          <input
            type="tel"
            id="seller-phone"
            placeholder="مثال: 31612345678+"
            required
          />
        </div>

        <div class="form-group">
          <label for="seller-address">العنوان الكامل للمتجر / المستودع</label>
          <input
            type="text"
            id="seller-address"
            placeholder="اسم الشارع، الرقم، الرمز البريدي، المدينة"
            required
          />
        </div>

        <div class="stripe-section">
          <button type="button" class="stripe-btn" id="connect-stripe-btn">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M4 4l17 17" />
            </svg>
            ربط حساب Stripe لتلقي المدفوعات
          </button>
          <p class="stripe-status" id="stripe-status-text">
            الحالة: غير مرتبط حالياً ❌
          </p>
        </div>

        <button type="submit" class="submit-btn">حفظ وإنشاء المتجر الآن</button>
      </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/complete-seller-profile.js"></script>
  </body>
</html>
