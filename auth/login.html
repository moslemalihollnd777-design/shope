<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - Ali Netherlands</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="auth-page">
    <div class="login-container">
      <div class="auth-logo">
        <a href="../index.html">
          <h2>Ali <span class="brand-primary">Holland</span></h2>
        </a>
      </div>

      <div class="auth-box">
        <h1>تسجيل الدخول</h1>
        <p>أهلاً بك مجدداً! يرجى إدخال بياناتك.</p>

        <form id="loginForm">
          <div class="input-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="example@mail.com"
              required
            />
          </div>

          <div class="input-group">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input
              type="password"
              id="loginPass"
              placeholder="********"
              required
            />
          </div>

          <div class="auth-options">
            <label><input type="checkbox" /> تذكرني</label>
            <a
              href="javascript:void(0)"
              id="forgotPasswordLink"
              class="forgot-password"
              >نسيت كلمة المرور؟</a
            >
          </div>

          <button type="submit" class="btn-auth">دخول</button>
        </form>

        <div class="auth-footer">
          ليس لديك حساب؟ <a href="register.html">أنشئ حساباً الآن</a>
        </div>
      </div>
    </div>

    <div id="resetModal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <i class="fas fa-lock-open"></i>
          <h3>استعادة كلمة المرور</h3>
        </div>
        <p>أدخل بريدك الإلكتروني وسنرسل لك رابطاً لتعيين كلمة سر جديدة.</p>
        <div class="input-group">
          <input
            type="email"
            id="resetEmail"
            placeholder="example@gmail.com"
            required
          />
        </div>
        <button id="resetSendBtn" class="btn-send">إرسال الرابط</button>
        <button id="resetCloseButton" class="btn-cancel">إلغاء</button>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>

    <script src="../js/auth.js"></script>
  </body>
</html>
