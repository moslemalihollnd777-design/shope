<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب - Ali Holland</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="auth-page">
    <div class="login-container wide">
      <div class="auth-logo">
        <a href="../index.html">
          <h2 class="auth-brand">
            Ali <span class="brand-primary">Holland</span>
          </h2>
        </a>
      </div>

      <div class="auth-box">
        <h1 class="page-heading">إنشاء حساب جديد</h1>
        <p class="form-description">يرجى اختيار نوع الحساب للبدء بموقعنا</p>

        <form id="signupForm">
          <div class="user-type-selection">
            <label class="type-card">
              <input type="radio" name="userRole" value="seller" checked />
              <div class="card-content">
                <i class="fas fa-store type-icon primary"></i>
                <strong>حساب بائع</strong>
                <p class="type-note">
                  أريد عرض منتجاتي والبيع عبر المتجر (عمولة4%)
                </p>
              </div>
            </label>

            <label class="type-card">
              <input type="radio" name="userRole" value="customer" />
              <div class="card-content">
                <i class="fas fa-shopping-basket type-icon secondary"></i>
                <strong>حساب زبون</strong>
                <p class="type-note">
                  أريد تصفح السلع والشراء والتسوق من البائعين
                </p>
              </div>
            </label>
          </div>

          <div class="input-group">
            <label>الاسم الكامل</label>
            <input
              type="text"
              id="userName"
              placeholder="مثلاً: علي محمد"
              required
            />
          </div>

          <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input
              type="email"
              id="signupEmail"
              placeholder="name@example.com"
              required
            />
          </div>

          <div class="input-group">
            <label>كلمة المرور</label>
            <input
              type="password"
              id="signupPass"
              placeholder="أدخل كلمة مرور قوية"
              required
            />
          </div>

          <button type="submit" class="add-btn mt-10">إنشاء الحساب الآن</button>
        </form>

        <div class="auth-footer auth-footer-center">
          لديك حساب بالفعل؟
          <a href="login.html" class="btn-link">دخول</a>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
